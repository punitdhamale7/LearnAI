<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LearnAI</title>
    <link rel="stylesheet" href="styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles/icons.css">
    <script src="scripts/config.js"></script>
    <script src="scripts/api.js"></script>
</head>
<body>
    <div class="auth-container">
        <!-- Left Side - Image/Visual -->
        <div class="auth-visual">
            <div class="visual-content">
                <h1>Welcome Back!</h1>
                <p>Continue your learning journey where you left off</p>
                <div class="visual-features">
                    <div class="visual-feature">
                        <span class="feature-icon"><span class="icon-3d-wrapper icon-xs icon-white"><i data-lucide="check-circle-2"></i></span></span>
                        <p>Access your courses</p>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-icon"><span class="icon-3d-wrapper icon-xs icon-white"><i data-lucide="bar-chart-3"></i></span></span>
                        <p>Track your progress</p>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-icon"><span class="icon-3d-wrapper icon-xs icon-white"><i data-lucide="play-circle"></i></span></span>
                        <p>Continue learning</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <div class="auth-header">
                    <a href="index.html" class="back-link">← Back to Home</a>
                    <h2>Sign In</h2>
                    <p>Welcome back! Please enter your details</p>
                </div>

                <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                    <!-- Email or Username -->
                    <div class="form-group">
                        <label for="emailOrUsername">Email or Username</label>
                        <input 
                            type="text" 
                            id="emailOrUsername" 
                            name="emailOrUsername" 
                            placeholder="Enter your email or username"
                            required
                        >
                        <span class="error-message" id="emailOrUsernameError"></span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-options">
                        <label class="checkbox-label remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-text">Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn">
                        Sign In
                    </button>

                    <!-- Divider -->
                    <div class="divider">
                        <span>or continue with</span>
                    </div>

                    <!-- Social Login -->
                    <div class="social-login">
                        <button type="button" class="social-btn google" onclick="socialLogin('google')">
                            <img src="assets/google-icon.svg" alt="Google">
                            Google
                        </button>
                        <button type="button" class="social-btn github" onclick="socialLogin('github')">
                            <img src="assets/github-icon.svg" alt="GitHub">
                            GitHub
                        </button>
                    </div>

                    <!-- Admin Button -->
                    <a href="admin-login.html" class="admin-btn">
                        🛡️ Login as Admin
                    </a>

                    <!-- Register Link -->
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
